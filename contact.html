<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Zutly</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1e293b; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #5b4cf0 0%, #3f31c4 100%); color: white; padding: 60px 20px; text-align: center; }
        .header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }
        .container { max-width: 600px; margin: -40px auto 40px; padding: 0 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.9rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input, textarea, select { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; font-family: inherit; transition: border-color 0.2s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #5b4cf0; box-shadow: 0 0 0 3px rgba(91,76,240,0.1); }
        textarea { min-height: 120px; resize: vertical; }
        .btn-submit { width: 100%; padding: 16px; background: #5b4cf0; color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.2s; }
        .btn-submit:hover { background: #4c3de0; transform: translateY(-1px); }
        .divider { text-align: center; margin: 24px 0; color: #94a3b8; font-size: 0.85rem; }
        .email-link { display: block; text-align: center; padding: 14px; border: 2px solid #5b4cf0; border-radius: 14px; color: #5b4cf0; text-decoration: none; font-weight: 600; transition: background 0.2s; }
        .email-link:hover { background: #f0effe; }
        .success { display: none; text-align: center; padding: 40px 20px; }
        .success h2 { color: #16a34a; margin-bottom: 12px; }
        .success p { color: #64748b; }
        .back { display: inline-block; margin: 20px; color: white; text-decoration: none; font-weight: 600; opacity: 0.9; }
        footer { text-align: center; padding: 30px; color: #94a3b8; font-size: 0.85rem; }
        footer a { color: #5b4cf0; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← Back to Home</a>
        <h1>Contact Us</h1>
        <p>We'd love to hear from you</p>
    </div>

    <div class="container">
        <div class="card">
            <form id="contactForm" action="https://formsubmit.co/ab76c9bf326f9d274cefc7f5b2a98f7a" method="POST">
                <input type="hidden" name="_subject" value="Zutly Website - Contact Form">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://zutly.in/contact.html?success=true">
                <input type="text" name="_honey" style="display:none">

                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Tell us how we can help..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Send Message</button>
            </form>

            <div class="success" id="successMsg">
                <h2>✓ Message Sent!</h2>
                <p>Thanks for reaching out. We'll get back to you within 48 hours.</p>
            </div>

            <div class="divider">— or email us directly —</div>

            <a href="mailto:support@zutly.in?subject=Zutly%20-%20Contact" class="email-link">
                📧 support@zutly.in
            </a>
        </div>
    </div>

    <footer>
        <p><a href="index.html">Home</a> · <a href="privacy-policy.html">Privacy Policy</a> · <a href="delete-account.html">Delete Account</a></p>
        <p style="margin-top: 8px;">© 2026 Zutly. All rights reserved.</p>
    </footer>

    <script>
        if (window.location.search.includes('success')) {
            document.getElementById('contactForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        }
    </script>
</body>
</html>
